<!-- Configuración visual del panel administrativo -->
<section class="seccion">
  <div class="seccion__encabezado">
    <h2>Configuración</h2>
    <p>Define el nombre de empresa y sube un logo pequeño para el sidebar.</p>
  </div>

  <form class="seccion__tarjeta formulario" (ngSubmit)="guardarConfiguracion()">
    <label class="formulario__campo">
      <span>Nombre de empresa</span>
      <input
        type="text"
        name="nombreEmpresa"
        [(ngModel)]="configuracion.nombreEmpresa"
        placeholder="Ejemplo: Pollos Frescos S.A."
      />
    </label>

    <label class="formulario__campo">
      <span>Subir logo (imagen pequeña)</span>
      <input type="file" accept="image/*" (change)="seleccionarLogo($event)" />
    </label>

    @if (configuracion.logoUrl.trim()) {
      <div class="formulario__preview">
        <p>Vista previa del logo:</p>
        <img [src]="configuracion.logoUrl" alt="Vista previa del logo" />
      </div>
    }

    <button type="submit" class="formulario__boton" [disabled]="subiendoLogo">Guardar cambios</button>

    @if (subiendoLogo) {
      <p class="formulario__mensaje">Subiendo logo...</p>
    }

    @if (mensajeGuardado) {
      <p class="formulario__mensaje">{{ mensajeGuardado }}</p>
    }

    @if (mensajeError) {
      <p class="formulario__mensaje formulario__mensaje--error">{{ mensajeError }}</p>
    }
  </form>
</section>
