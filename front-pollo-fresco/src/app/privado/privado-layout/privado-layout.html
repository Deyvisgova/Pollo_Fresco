<section class="panel">
  <header class="panel__topbar">
    <button
      type="button"
      class="panel__toggle"
      (click)="toggleSidebar()"
      [attr.aria-expanded]="esMovilOTablet ? sidebarMovilAbierto : !sidebarColapsadoDesktop"
      aria-controls="panel-sidebar"
      aria-label="Mostrar u ocultar menú lateral"
    >
      ☰
    </button>

    <p class="panel__topbar-mensaje">Bienvenidos al sistema de EL POLLO FRESCO</p>

    <div class="panel__acciones-usuario">
      <button
        type="button"
        class="theme-toggle"
        [class.theme-toggle--dark]="temaActual() === 'dark'"
        (click)="toggleTema()"
        [attr.aria-label]="temaActual() === 'dark' ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
      >
        <i class="fas fa-sun theme-track-icon theme-track-icon-sun" aria-hidden="true"></i>
        <i class="fas fa-moon theme-track-icon theme-track-icon-moon" aria-hidden="true"></i>
        <span class="theme-toggle__knob" aria-hidden="true"></span>
      </button>

      <div class="panel__usuario">
      <button
        type="button"
        class="panel__usuario-trigger"
        [attr.aria-expanded]="menuUsuarioAbierto"
        (click)="toggleMenuUsuario($event)"
      >
        <span class="panel__usuario-icono" aria-hidden="true">👤</span>
        <span class="panel__usuario-nombre">{{ nombreUsuario() }}</span>
        <span class="panel__usuario-flecha" aria-hidden="true">⌄</span>
      </button>

      <div class="panel__usuario-menu" *ngIf="menuUsuarioAbierto">
        <p class="panel__usuario-titulo">{{ nombreUsuario() }}</p>
        <button type="button" class="panel__usuario-item" (click)="irACambiarContrasena()">
          Cambiar contraseña
        </button>
        <button type="button" class="panel__usuario-item panel__usuario-item--salir" (click)="cerrarSesion()">
          Cerrar sesión
        </button>
      </div>
      </div>
    </div>
  </header>

  <div class="panel__cuerpo" [class.panel__cuerpo--compacto]="sidebarColapsadoDesktop">
    <aside
      class="panel__sidebar"
      id="panel-sidebar"
      [class.panel__sidebar--abierto]="sidebarMovilAbierto"
      [class.panel__sidebar--compacto]="sidebarColapsadoDesktop"
    >
      <div class="panel__logo">
        @if (mostrarLogo()) {
          <img
            class="panel__logo-imagen"
            [src]="configuracionEmpresa().logoUrl"
            [alt]="'Logo de ' + configuracionEmpresa().nombreEmpresa"
          />
        } @else {
          <div class="panel__logo-imagen panel__logo-imagen--placeholder">LOGO</div>
        }
        <p class="panel__empresa">{{ configuracionEmpresa().nombreEmpresa }}</p>
      </div>

      <nav class="panel__menu" aria-label="Navegación del panel">
        <a
          *ngFor="let item of menuPrincipal"
          [routerLink]="item.ruta"
          routerLinkActive="panel__link--activo"
          class="panel__link"
          [attr.title]="item.etiqueta"
          (click)="cerrarSidebarEnMovil()"
        >
          <span class="panel__link-icono" aria-hidden="true">{{ item.icono }}</span>
          <span class="panel__link-texto">{{ item.etiqueta }}</span>
        </a>

        <div class="panel__accordion" [class.panel__accordion--abierto]="ventaMenuAbierto">
          <button
            type="button"
            class="panel__link panel__link--trigger"
            [class.panel__link--activo]="rutaVentaActiva"
            (click)="toggleVentaMenu()"
            [attr.aria-expanded]="ventaMenuAbierto"
            title="Venta"
          >
            <span class="panel__link-icono" aria-hidden="true">🧾</span>
            <span class="panel__link-texto">Venta</span>
            <span class="panel__chevron" aria-hidden="true">⌄</span>
          </button>

          <div class="panel__submenu" *ngIf="ventaMenuAbierto">
            <a
              [routerLink]="'venta'"
              routerLinkActive="panel__sublink--activo"
              [routerLinkActiveOptions]="{ exact: true }"
              class="panel__sublink"
              (click)="cerrarSidebarEnMovil()"
            >
              Emitir comprobante
            </a>
            <a
              [routerLink]="'venta-registros'"
              routerLinkActive="panel__sublink--activo"
              class="panel__sublink"
              (click)="cerrarSidebarEnMovil()"
            >
              Ventas registradas
            </a>
          </div>
        </div>

        <a
          *ngFor="let item of menuPosterior"
          [routerLink]="item.ruta"
          routerLinkActive="panel__link--activo"
          class="panel__link"
          [attr.title]="item.etiqueta"
          (click)="cerrarSidebarEnMovil()"
        >
          <span class="panel__link-icono" aria-hidden="true">{{ item.icono }}</span>
          <span class="panel__link-texto">{{ item.etiqueta }}</span>
        </a>
      </nav>

      <button class="panel__salir panel__salir--fijo" type="button" (click)="cerrarSesion()" title="Cerrar sesión">
        <span class="panel__link-icono" aria-hidden="true">🚪</span>
        <span class="panel__link-texto">Cerrar sesión</span>
      </button>
    </aside>

    <main class="panel__contenido">
      <section class="panel__rutas">
        <router-outlet></router-outlet>
      </section>
    </main>
  </div>
</section>
