<!-- Contenedor general del panel administrativo -->
<section class="panel" [class.panel--sidebar-abierto]="sidebarAbierto">
  <button
    type="button"
    class="panel__toggle"
    (click)="toggleSidebar()"
    [attr.aria-expanded]="sidebarAbierto"
    aria-controls="panel-sidebar"
    aria-label="Mostrar u ocultar menú lateral"
  >
    ☰
  </button>

  <!-- Barra lateral con identidad de la empresa y navegación -->
  <aside class="panel__sidebar" id="panel-sidebar" [class.panel__sidebar--abierto]="sidebarAbierto">
    <!-- Área de logo con imagen configurable -->
    <div class="panel__logo">
      @if (mostrarLogo()) {
        <img
          class="panel__logo-imagen"
          [src]="configuracionEmpresa().logoUrl"
          [alt]="'Logo de ' + configuracionEmpresa().nombreEmpresa"
        />
      } @else {
        <div class="panel__logo-imagen panel__logo-imagen--placeholder">LOGO (imagen)</div>
      }
      <p class="panel__empresa">{{ configuracionEmpresa().nombreEmpresa }}</p>
    </div>

    <!-- Navegación principal del módulo privado -->
    <nav class="panel__menu" aria-label="Navegación del panel">
      <a
        *ngFor="let item of menuPrincipal"
        [routerLink]="item.ruta"
        routerLinkActive="panel__link--activo"
        class="panel__link"
        (click)="cerrarSidebarEnMovil()"
      >
        {{ item.etiqueta }}
      </a>

      <div class="panel__accordion" [class.panel__accordion--abierto]="ventaMenuAbierto">
        <button
          type="button"
          class="panel__link panel__link--trigger"
          [class.panel__link--activo]="rutaVentaActiva"
          (click)="toggleVentaMenu()"
          [attr.aria-expanded]="ventaMenuAbierto"
        >
          <span>Venta</span>
          <span class="panel__chevron" aria-hidden="true">⌄</span>
        </button>

        <div class="panel__submenu" *ngIf="ventaMenuAbierto">
          <a
            [routerLink]="'venta'"
            routerLinkActive="panel__sublink--activo"
            [routerLinkActiveOptions]="{ exact: true }"
            class="panel__sublink"
            (click)="cerrarSidebarEnMovil()"
          >
            Emitir comprobante
          </a>
          <a
            [routerLink]="'venta-registros'"
            routerLinkActive="panel__sublink--activo"
            class="panel__sublink"
            (click)="cerrarSidebarEnMovil()"
          >
            Ventas registradas
          </a>
        </div>
      </div>

      <a
        *ngFor="let item of menuPosterior"
        [routerLink]="item.ruta"
        routerLinkActive="panel__link--activo"
        class="panel__link"
        (click)="cerrarSidebarEnMovil()"
      >
        {{ item.etiqueta }}
      </a>
    </nav>

    <!-- Acciones secundarias, por ejemplo cerrar sesión -->
    <button class="panel__salir" type="button" (click)="cerrarSesion()">Cerrar sesión</button>
  </aside>

  <!-- Área principal en donde se renderizan las rutas hijas -->
  <main class="panel__contenido">
    <!-- Aquí se pintan los componentes de las rutas hijas -->
    <section class="panel__rutas">
      <router-outlet></router-outlet>
    </section>
  </main>
</section>
